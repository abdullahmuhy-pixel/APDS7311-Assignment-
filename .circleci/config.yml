version: 2.1

jobs:
  build-and-scan:
    docker:
      - image: cimg/node:20.10
    working_directory: ~/project

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - checkout

      # ── 2. Install frontend dependencies ─────────────────────────────────────
      - run:
          name: Install frontend dependencies
          command: npm install

      # ── 3. Unit tests ────────────────────────────────────────────────────────
      - run:
          name: Run unit tests
          command: npm test --passWithNoTests || true

      # ── 4. Build frontend (Vite) ─────────────────────────────────────────────
      - run:
          name: Build frontend
          command: npm run build --if-present

      # ── 5. Install Java (required by sonar-scanner CLI) ──────────────────────
      - run:
          name: Install Java 17
          command: |
            sudo apt-get update -y
            sudo apt-get install -y openjdk-17-jre-headless
            java -version

      # ── 6. Install sonar-scanner CLI ─────────────────────────────────────────
      - run:
          name: Install sonar-scanner
          command: |
            SONAR_VERSION="6.2.1.4610"
            wget -q "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_VERSION}-linux-x64.zip" \
              -O /tmp/sonar-scanner.zip
            unzip -q /tmp/sonar-scanner.zip -d /opt
            echo "export PATH=/opt/sonar-scanner-${SONAR_VERSION}-linux-x64/bin:$PATH" >> "$BASH_ENV"
            source "$BASH_ENV"
            sonar-scanner --version

      # ── 7. SonarQube static analysis scan ────────────────────────────────────
      - run:
          name: SonarQube Static Analysis Scan
          command: |
            sonar-scanner \
              -Dsonar.projectKey=apds7311-banking \
              -Dsonar.projectName="APDS7311 Banking Portal" \
              -Dsonar.projectVersion=1.0 \
              -Dsonar.sources=. \
              -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.scm.provider=git

workflows:
  devsecops:
    jobs:
      - build-and-scan:
          filters:
            branches:
              only: main
              

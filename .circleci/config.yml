version: 2.1

jobs:
  build-and-scan:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/project

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - checkout

      # ── 2. Install frontend dependencies ─────────────────────────────────────
      - run:
          name: Install frontend dependencies
          command: npm install --legacy-peer-deps

      # ── 3. Unit tests (skip gracefully if no test script defined) ────────────
      - run:
          name: Run unit tests
          command: |
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
              npm test
            else
              echo "No test script defined in package.json — skipping."
            fi

      # ── 4. Install Java (required by sonar-scanner CLI) ──────────────────────
      - run:
          name: Install Java 17
          command: |
            sudo apt-get update -y
            sudo apt-get install -y openjdk-17-jre-headless
            java -version

      # ── 5. Install sonar-scanner CLI (to home dir — no sudo needed) ──────────
      - run:
          name: Install sonar-scanner
          command: |
            SONAR_VERSION="6.2.1.4610"
            wget -q "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_VERSION}-linux-x64.zip" \
              -O /tmp/sonar-scanner.zip
            unzip -q /tmp/sonar-scanner.zip -d ~/
            echo "export PATH=~/sonar-scanner-${SONAR_VERSION}-linux-x64/bin:$PATH" >> "$BASH_ENV"
            source "$BASH_ENV"
            sonar-scanner --version

      # ── 6. SonarQube static analysis scan ────────────────────────────────────
      - run:
          name: SonarQube Static Analysis Scan
          command: |
            sonar-scanner \
              -Dsonar.organization=abdullahmuhy-pixel \
              -Dsonar.projectKey=abdullahmuhy-pixel_APDS7311-Assignment- \
              -Dsonar.projectName="APDS7311 Banking Portal" \
              -Dsonar.projectVersion=1.0 \
              -Dsonar.sources=. \
              -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.scm.provider=git

workflows:
  devsecops:
    jobs:
      - build-and-scan:
          filters:
            branches:
              only: main
              
